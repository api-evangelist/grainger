description: >-
  W.W. Grainger, Inc. is a Fortune 500 industrial supply company headquartered
  in Lake Forest, Illinois. Grainger distributes maintenance, repair, and
  operating (MRO) products and services to businesses, government agencies,
  and institutions across North America, Japan, and the United Kingdom. This
  repository captures any APIs, developer tools, and machine-readable API
  artifacts associated with Grainger. No public developer APIs or documentation
